<body>

<!-- Header -->

      <path d="M14 5L7 9.5V18.5L14 23L21 18.5V9.5L14 5Z" stroke="#fff" stroke-width="1.5" fill="none"/>
      <path d="M14 9L10 11.5V16.5L14 19L18 16.5V11.5L14 9Z" fill="#fff" opacity=".3"/>
      <circle cx="14" cy="14" r="2" fill="#fff"/>

  <div class="header-spacer"></div>
  <div class="header-actions">
    <button class="btn-icon" id="theme-btn" data-theme-toggle aria-label="Toggle theme" title="Toggle dark/light mode">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
    <button class="btn-icon hamburger" id="hamburger-btn" aria-label="Open navigation menu" aria-expanded="false">

    </button>
  </div>
</header>

<!-- Mobile drawer -->
<div class="drawer-overlay" id="drawer-overlay" aria-hidden="true"></div>
<nav class="drawer" id="mobile-drawer" aria-label="Mobile navigation">
  <div class="drawer-header">
    <span style="font-weight:800;font-size:13px;color:var(--text)">Navigation</span>
    <button class="drawer-close" id="drawer-close" aria-label="Close navigation">&#x2715;</button>
  </div>
  <button class="drawer-btn" data-nav="overview">&#x1F5FA; Overview</button>
  <button class="drawer-btn" data-nav="ksa">&#x1F1F8;&#x1F1E6; Saudi Arabia</button>
  <button class="drawer-btn" data-nav="uae">&#x1F1E6;&#x1F1EA; UAE</button>
  <button class="drawer-btn" data-nav="qatar">&#x1F1F6;&#x1F1E6; Qatar</button>
  <button class="drawer-btn" data-nav="kuwait">&#x1F1F0;&#x1F1FC; Kuwait</button>
  <button class="drawer-btn" data-nav="bahrain">&#x1F1E7;&#x1F1ED; Bahrain</button>
  <button class="drawer-btn" data-nav="oman">&#x1F1F4;&#x1F1F2; Oman</button>
  <button class="drawer-btn" data-nav="heatmap">&#x1F321; Heatmap</button>
  <button class="drawer-btn" data-nav="ai-ideas">&#x1F916; AI Ideas</button>
  <div style="border-top:1px solid var(--border);margin:8px 0;padding:4px 0">
    <div style="font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:4px 18px">Deep Dives</div>
    <button class="drawer-btn" data-nav="geo-ai-seo">&#x1F4CD; Geo &amp; AI SEO</button>
    <button class="drawer-btn" data-nav="feature-gaps">&#x1F50D; Feature Gaps</button>
    <button class="drawer-btn" data-nav="product-gaps">&#x1F4E6; Product Gaps</button>
    <button class="drawer-btn" data-nav="tech-gaps">&#x2699;&#xFE0F; Tech Gaps</button>
    <button class="drawer-btn" data-nav="tech-stack">&#x1F3D7; Tech Stack</button>
    <button class="drawer-btn" data-nav="global-comparison">&#x1F30D; Global Comparison</button>
    <button class="drawer-btn" data-nav="improvements">&#x1F680; Improvements</button>
  </div>
</nav>

<!-- Sidebar -->
<aside class="sidebar" aria-label="Main navigation">
  <div class="sidebar-section">
    <span class="sidebar-label">Regional Analysis</span>
    <button class="nav-btn" data-nav="overview"><span class="nav-icon">&#x1F5FA;</span> Overview</button>
    <button class="nav-btn" data-nav="ksa"><span class="nav-icon">&#x1F1F8;&#x1F1E6;</span> Saudi Arabia</button>
    <button class="nav-btn" data-nav="uae"><span class="nav-icon">&#x1F1E6;&#x1F1EA;</span> UAE</button>
    <button class="nav-btn" data-nav="qatar"><span class="nav-icon">&#x1F1F6;&#x1F1E6;</span> Qatar</button>
    <button class="nav-btn" data-nav="kuwait"><span class="nav-icon">&#x1F1F0;&#x1F1FC;</span> Kuwait</button>
    <button class="nav-btn" data-nav="bahrain"><span class="nav-icon">&#x1F1E7;&#x1F1ED;</span> Bahrain</button>
    <button class="nav-btn" data-nav="oman"><span class="nav-icon">&#x1F1F4;&#x1F1F2;</span> Oman</button>
  </div>

    <span class="sidebar-label">Intelligence</span>
    <button class="nav-btn" data-nav="heatmap"><span class="nav-icon">&#x1F321;</span> Heatmap</button>
    <button class="nav-btn ai-tab" data-nav="ai-ideas"><span class="nav-icon">&#x1F916;</span> AI Ideas</button>
  </div>
  <div class="sidebar-section">
    <span class="sidebar-label">Deep Dives</span>
    <button class="nav-btn dee" data-nav="deep-dives-menu"><span class="nav-icon">&#x1F52C;</span> All Deep Dives</button>
    <button class="nav-btn" data-nav="geo-ai-seo" style="font-size:12px;padding:5px 10px;color:#0f766e"><span class="nav-icon">&#x1F4CD;</span> Geo &amp; AI SEO</button>
    <button class="nav-btn" data-nav="feature-gaps" style="font-size:12px;padding:5px 10px;color:#0f766e"><span class="nav-icon">&#x1F50D;</span> Feature Gaps</button>
    <button class="nav-btn" data-nav="product-gaps" style="font-size:12px;padding:5px 10px;color:#0f766e"><span class="nav-icon">&#x1F4E6;</span> Product Gaps</button>
    <button class="nav-btn" data-nav="tech-gaps" style="font-size:12px;padding:5px 10px;color:#0f766e"><span class="nav-icon">&#x2699;&#xFE0F;</span> Tech Gaps</button>
    <button class="nav-btn" data-nav="tech-stack" style="font-size:12px;padding:5px 10px;color:#0f766e"><span class="nav-icon">&#x1F3D7;</span> Tech Stack</button>
    <button class="nav-btn" data-nav="global-comparison" style="font-size:12px;padding:5px 10px;color:#0f766e"><span class="nav-icon">&#x1F30D;</span> Global</button>
    <button class="nav-btn" data-nav="improvements" style="font-size:12px;padding:5px 10px;color:#0f766e"><span class="nav-icon">&#x1F680;</span> Improvements</button>
  </div>
</aside>

<!-- Main layout -->
<div class="layout">
  <div></div>
  <main id="main-content">
    <div id="sec-container"></div>
    <footer class="site-footer">
      <p>GCC Insurance Market Research &copy; 2026 &mdash; Data sourced from public company websites, regulatory filings, and industry reports.</p>
    </footer>
  </main>
</div>

<script>
(function(){
  'use strict';

  var bar = document.getElementById('scroll-bar');
  document.addEventListener('scroll', function(){
    var pct = window.scrollY / (document.documentElement.scrollHeight - window.innerHeight) * 100;
    if(bar) bar.style.width = Math.min(100, pct) + '%';
  }, {passive:true});

  /* ── Section registry — relative same-origin paths (works on GitHub Pages) ── */
  var SEC_FILES = {
    overview:            'sections/overview.html',
    ksa:                 'sections/ksa.html',
    uae:                 'sections/uae.html',
    qatar:               'sections/qatar.html',
    kuwait:              'sections/kuwait.html',
    bahrain:             'sections/bahrain.html',
    oman:                'sections/oman.html',
    heatmap:             'sections/heatmap.html',
    'ai-ideas':          'sections/ai-ideas.html',
    'deep-dives-menu':   'sections/deep-dives-menu.html',
    'geo-ai-seo':        'sections/geo-ai-seo.html',
    'feature-gaps':      'sections/feature-gaps.html',
    'product-gaps':      'sections/product-gaps.html',
    'tech-gaps':         'sections/tech-gaps.html',
    'tech-stack':        'sections/tech-stack.html',
    'global-comparison': 'sections/global-comparison.html',
    improvements:        'sections/improvements.html',
    'cx-intelligence':   'sections/cx-intelligence.html',
    radars:              'sections/radars.html',
    regulatory:          'sections/regulatory.html',
    technology:          'sections/technology.html',
    insurtechs:          'sections/insurtechs.html',
    opportunity:         'sections/opportunity.html',
    'gap-playbook':      'sections/gap-playbook.html'
  };

  var cache = {};
  var currentSec = null;
  var container = document.getElementById('sec-container');

  function loadSection(id, callback){
    if(cache[id]){ callback(cache[id]); return; }
    var url = SEC_FILES[id];
    if(!url){ callback('<div class="content callout callout-warn"><p>Section not found: ' + id + '</p></div>'); return; }
    fetch(url).then(function(r){
      if(!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    }).then(function(html){
      cache[id] = html;
      callback(html);
    }).catch(function(e){
      callback('<div class="content callout callout-warn"><p>Could not load section <strong>' + id + '</strong>. Error: ' + e.message + '</p></div>');
    });
  }

  window.showSection = function(id){
    if(!SEC_FILES[id]) return;
    document.querySelectorAll('.nav-btn[data-nav]').forEach(function(b){
      b.classList.toggle('active', b.dataset.nav === id);
    });
    document.querySelectorAll('.drawer-btn[data-nav]').forEach(function(b){
      b.classList.toggle('active', b.dataset.nav === id);
    });
    currentSec = id;
    window.scrollTo({top:0, behavior:'smooth'});
    container.innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted)"><div style="font-size:24px;margin-bottom:8px">&#x23F3;</div><div style="font-size:13px">Loading...</div></div>';
    loadSection(id, function(html){
      container.innerHTML = html;
      container.querySelectorAll('script').forEach(function(s){
        var ns = document.createElement('script');
        ns.textContent = s.textContent;
        document.body.appendChild(ns);
      });
      initTabs();
      closeMobileDrawer();
    });
  };

  function initTabs(){
    container.querySelectorAll('.tab-bar').forEach(function(bar){
      bar.querySelectorAll('.tab-btn').forEach(function(btn){
        btn.addEventListener('click', function(){
          var target = btn.dataset.tab;
          var parent = btn.closest('.tab-wrap') || btn.parentElement.parentElement;
          parent.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
          parent.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.remove('active'); });
          btn.classList.add('active');
          var panel = parent.querySelector('[data-panel="' + target + '"]');
          if(panel) panel.classList.add('active');
        });
      });
    });
  }

  document.querySelectorAll('[data-nav]').forEach(function(btn){
    btn.addEventListener('click', function(){
      showSection(btn.dataset.nav);
    });
  });

  var drawerEl = document.getElementById('mobile-drawer');
  var overlayEl = document.getElementById('drawer-overlay');
  var hamburger = document.getElementById('hamburger-btn');
  var drawerClose = document.getElementById('drawer-close');

  function openMobileDrawer(){
    drawerEl.classList.add('open');
    overlayEl.classList.add('open');
    overlayEl.setAttribute('aria-hidden','false');
    hamburger.setAttribute('aria-expanded','true');
    document.body.style.overflow = 'hidden';
  }
  function closeMobileDrawer(){
    drawerEl.classList.remove('open');
    overlayEl.classList.remove('open');
    overlayEl.setAttribute('aria-hidden','true');
    if(hamburger) hamburger.setAttribute('aria-expanded','false');
    document.body.style.overflow = '';
  }
  if(hamburger) hamburger.addEventListener('click', openMobileDrawer);
  if(drawerClose) drawerClose.addEventListener('click', closeMobileDrawer);
  if(overlayEl) overlayEl.addEventListener('click', closeMobileDrawer);

  var html = document.documentElement;
  var prefersDark = window.matchMedia('(prefers-color-scheme:dark)');
  var theme = prefersDark.matches ? 'dark' : 'light';
  html.setAttribute('data-theme', theme);
  var themeBtn = document.getElementById('theme-btn');
  function applyTheme(t){
    theme = t;
    html.setAttribute('data-theme', t);
    if(themeBtn){
      themeBtn.innerHTML = t === 'dark'
        ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
        : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
      themeBtn.setAttribute('aria-label', t === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
    }
    if(t === 'dark'){
      if(!document.getElementById('dark-css')){
        var s = document.createElement('style');
        s.id = 'dark-css';
        s.textContent = '[data-theme=dark]{--bg:#0f1117;--card:#181b25;--border:#262d3d;--text:#e2e8f0;--text-soft:#94a3b8;--muted:#64748b;--primary:#60a5fa;--primary-dark:#3b82f6;--primary-light:rgba(96,165,250,.1);--accent:#fbbf24;--accent-light:rgba(251,191,36,.1);--success:#34d399;--success-light:rgba(52,211,153,.1);--warning:#fcd34d;--danger:#f87171;--shadow:0 2px 8px rgba(0,0,0,.4);--shadow-lg:0 8px 28px rgba(0,0,0,.5)}[data-theme=dark] body{background:var(--bg)}[data-theme=dark] .site-header,[data-theme=dark] .sidebar,[data-theme=dark] .drawer{background:#12151e;border-color:var(--border)}[data-theme=dark] .nav-btn:hover,[data-theme=dark] .nav-btn.active{background:rgba(96,165,250,.12);color:var(--primary)}[data-theme=dark] .content{background:var(--card);border-color:var(--border)}[data-theme=dark] thead{background:var(--bg)}[data-theme=dark] tbody tr:hover{background:rgba(255,255,255,.03)}[data-theme=dark] .kpi-card{background:var(--card);border-color:var(--border)}[data-theme=dark] .ins-card{background:var(--card);border-color:var(--border)}[data-theme=dark] .ai-card{background:var(--card);border-color:var(--border)}[data-theme=dark] .scorecard-card{background:var(--card)}[data-theme=dark] .rm-task{background:var(--card)}';
        document.head.appendChild(s);
      }
    } else {
      var ds = document.getElementById('dark-css');
      if(ds) ds.remove();
    }
  }
  applyTheme(theme);
  if(themeBtn) themeBtn.addEventListener('click', function(){ applyTheme(theme === 'dark' ? 'light' : 'dark'); });

  showSection('overview');
})();
</script>
</body>
</html>
