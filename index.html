<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>GCC Insurance Market Research</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="Comprehensive GCC Insurance Market Research — regional analysis, technology landscape, product gaps, and AI opportunities across Saudi Arabia, UAE, Qatar, Kuwait, Bahrain and Oman."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
<style>
/* ── CSS restored and all external files inlined ── */
:root {
  --primary:#1a56db; --primary-dark:#1245b5; --primary-light:#e8f0fb;
  --accent:#f5a623; --accent-dark:#d4861a; --accent-light:#fef3e0;
  --success:#0d7a4e; --success-light:#e6f7f0;
  --warning:#b45309; --warning-light:#fef3c7;
  --danger:#c81e1e; --danger-light:#fde8e8;
  --bg:#f0f4fa; --card:#fff; --border:#dde3ef;
  --text:#1a1a2e; --text-soft:#52586a; --muted:#8a90a0;
  --sidebar-w:220px; --header-h:52px; --radius:10px;
  --shadow:0 2px 8px rgba(15,23,42,.08);
  --shadow-lg:0 8px 28px rgba(15,23,42,.12);
  --font-body:'Inter','Helvetica Neue',sans-serif;
  --font-display:'Instrument Serif',Georgia,serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:none;text-size-adjust:none}
body{font-family:var(--font-body);font-size:14px;color:var(--text);background:var(--bg);min-height:100dvh;line-height:1.6;-webkit-font-smoothing:antialiased}
img,svg{display:block;max-width:100%}
button,input,select,textarea{font:inherit;color:inherit}
a{color:var(--primary);text-decoration:none}
a:hover{text-decoration:underline}

/* Skip link */
.skip-link{position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden}
.skip-link:focus{position:fixed;top:8px;left:8px;width:auto;height:auto;padding:8px 16px;background:var(--primary);color:#fff;border-radius:6px;z-index:10000;font-weight:700}

/* Scroll progress */
.scroll-progress{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--accent));z-index:9999;transition:width .1s}

/* Header */
.site-header{position:fixed;top:0;left:0;right:0;height:var(--header-h);background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 16px;z-index:100;box-shadow:var(--shadow)}
.header-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text)}
.header-logo svg{flex-shrink:0}
.header-logo-text{font-family:var(--font-display);font-size:15px;font-weight:400;letter-spacing:.01em;white-space:nowrap}
.header-logo-text span{color:var(--primary)}
.header-spacer{flex:1}
.header-actions{display:flex;align-items:center;gap:8px}
.btn-icon{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-soft);transition:background .15s,color .15s}
.btn-icon:hover{background:var(--primary-light);color:var(--primary)}
.hamburger{display:none}

/* Sidebar */
.sidebar{position:fixed;top:var(--header-h);left:0;bottom:0;width:var(--sidebar-w);background:#fff;border-right:1px solid var(--border);overflow-y:auto;z-index:90;padding:12px 0 24px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-track{background:transparent}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

.sidebar-section{padding:0 8px;margin-bottom:4px}
.sidebar-label{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);padding:8px 10px 4px;display:block}
.nav-btn{display:flex;align-items:center;gap:8px;width:100%;padding:7px 10px;border-radius:8px;border:none;background:transparent;cursor:pointer;font-size:12.5px;font-weight:500;color:var(--text-soft);text-align:left;transition:background .15s,color .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-btn .nav-icon{font-size:14px;flex-shrink:0;width:18px;text-align:center}
.nav-btn:hover{background:var(--primary-light);color:var(--primary)}
.nav-btn.active{background:var(--primary-light);color:var(--primary);font-weight:700}
.nav-btn.active::before{content:'';position:absolute;left:8px;width:3px;height:20px;background:var(--primary);border-radius:2px}
.sidebar-section{position:relative}

/* Deep Dives group */
.nav-group{margin-top:2px}
.nav-group-toggle{display:flex;align-items:center;gap:8px;width:100%;padding:7px 10px;border-radius:8px;border:none;background:transparent;cursor:pointer;font-size:12.5px;font-weight:600;color:var(--text-soft);text-align:left;transition:background .15s,color .15s}
.nav-group-toggle:hover{background:var(--primary-light);color:var(--primary)}
.nav-group-toggle .chevron{margin-left:auto;transition:transform .2s;font-size:10px}
.nav-group.open .chevron{transform:rotate(90deg)}
.nav-group-children{display:none;padding-left:10px}
.nav-group.open .nav-group-children{display:block}
.nav-group-children .nav-btn{font-size:12px;padding:5px 10px}

/* Main layout */
.layout{display:grid;grid-template-columns:var(--sidebar-w) 1fr;margin-top:var(--header-h);min-height:calc(100dvh - var(--header-h))}
#main-content{min-width:0;padding:24px;max-width:1200px;margin:0 auto;width:100%}

/* Section styles */
[data-sec]{display:none}
[data-sec].active{display:block;animation:fadeInUp .3s ease}
@keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.sec-title{font-family:var(--font-display);font-size:clamp(1.4rem,2.5vw,2rem);font-weight:400;color:var(--text);margin-bottom:6px;line-height:1.2}
.sec-desc{font-size:13px;color:var(--text-soft);margin-bottom:20px;max-width:70ch;line-height:1.6}
.sec-subtitle{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--primary);margin:24px 0 10px;padding-bottom:6px;border-bottom:2px solid var(--primary-light)}
.content{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;margin-bottom:16px;box-shadow:var(--shadow)}
.content-title{font-size:14px;font-weight:800;color:var(--text);margin-bottom:8px}
p{color:var(--text-soft);font-size:13px;line-height:1.7;margin-bottom:10px;max-width:80ch}
p:last-child{margin-bottom:0}

/* KPI strip */
.kpi-strip{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:18px}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;text-align:center;box-shadow:var(--shadow)}
.kpi-num{font-size:clamp(1.4rem,2vw,1.8rem);font-weight:900;color:var(--primary);line-height:1.1;font-variant-numeric:tabular-nums}
.kpi-lbl{font-size:11px;color:var(--muted);margin-top:3px;font-weight:600}
.kpi-delta{font-size:10.5px;margin-top:2px;font-weight:700}
.kpi-delta.up{color:var(--success)}
.kpi-delta.down{color:var(--danger)}

/* Tables */
.tbl-wrap{overflow-x:auto;margin-bottom:16px;border-radius:var(--radius);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead{background:var(--bg)}
th{padding:10px 12px;text-align:left;font-weight:700;color:var(--text-soft);font-size:11px;text-transform:uppercase;letter-spacing:.06em;border-bottom:2px solid var(--border);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:top}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--bg)}

/* Chips & badges */
.chip,.badge,.lchip{display:inline-block;padding:2px 9px;border-radius:10px;font-size:10.5px;font-weight:700;letter-spacing:.03em;white-space:nowrap}
.chip-yes{background:#dcfce7;color:#166534}
.chip-no{background:#fee2e2;color:#991b1b}
.chip-gap{background:#fef3c7;color:#92400e}
.chip-partial{background:#e0f2fe;color:#0369a1}
.chip-basic{background:#f3f4f6;color:#374151}
.badge-live{background:#dcfce7;color:#166534}
.badge-pilot{background:#fef9c3;color:#854d0e}
.badge-beta{background:#e0f2fe;color:#075985}
.badge-legacy{background:#fee2e2;color:#991b1b}
.badge-modern{background:#ede9fe;color:#5b21b6}
.lchip{border:1.5px solid currentColor;background:transparent}
.lchip-primary{color:var(--primary)}
.lchip-warn{color:var(--warning)}
.lchip-danger{color:var(--danger)}

/* Callouts */
.callout{border-left:3px solid var(--border);background:var(--bg);padding:10px 14px;border-radius:0 8px 8px 0;margin:12px 0;font-size:12.5px;line-height:1.65}
.callout-info{border-color:var(--primary);background:var(--primary-light)}
.callout-warn{border-color:var(--accent);background:var(--accent-light)}
.callout-danger{border-color:var(--danger);background:var(--danger-light)}
.callout-success{border-color:var(--success);background:var(--success-light)}

/* Grid layouts */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:16px}
.card-grid-2{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;margin-bottom:16px}
.ins-card{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:16px 18px;transition:box-shadow .18s,transform .15s}
.ins-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.ins-card-name{font-size:13.5px;font-weight:800;color:var(--text);margin-bottom:6px}
.ins-card-sub{font-size:11.5px;color:var(--muted);margin-bottom:10px}
.ins-card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}

/* Heatmap */
.heatmap-table td{text-align:center;font-size:11px;font-weight:700;min-width:70px;border-radius:4px;padding:6px 4px}
.hm-5{background:#166534;color:#fff}
.hm-4{background:#16a34a;color:#fff}
.hm-3{background:#ca8a04;color:#fff}
.hm-2{background:#dc2626;color:#fff}
.hm-1{background:#7f1d1d;color:#fff}
.hm-0{background:#f3f4f6;color:#9ca3af}

/* Progress bars */
.prog-bar{height:6px;background:var(--border);border-radius:4px;overflow:hidden;margin:4px 0}
.prog-fill{height:100%;border-radius:4px;transition:width .6s ease}
.prog-primary{background:var(--primary)}
.prog-success{background:var(--success)}
.prog-accent{background:var(--accent)}
.prog-danger{background:var(--danger)}

/* Tabs */
.tab-bar{display:flex;gap:4px;border-bottom:2px solid var(--border);margin-bottom:18px;flex-wrap:wrap}
.tab-btn{padding:8px 14px;font-size:12px;font-weight:600;border:none;background:transparent;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .15s,border-color .15s;border-radius:4px 4px 0 0}
.tab-btn:hover{color:var(--primary)}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:800}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* Drawer (mobile nav) */
.drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:199;backdrop-filter:blur(2px)}
.drawer{position:fixed;top:0;left:-100%;bottom:0;width:260px;background:#fff;z-index:200;overflow-y:auto;transition:left .25s cubic-bezier(0.16,1,0.3,1);padding:16px 0 32px;box-shadow:var(--shadow-lg)}
.drawer.open{left:0}
.drawer-overlay.open{display:block}
.drawer-header{display:flex;align-items:center;justify-content:space-between;padding:0 16px 12px;border-bottom:1px solid var(--border);margin-bottom:8px}
.drawer-close{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--muted)}
.drawer-btn{display:flex;align-items:center;gap:10px;width:100%;padding:9px 18px;border:none;background:transparent;cursor:pointer;font-size:13px;color:var(--text-soft);text-align:left;transition:background .15s,color .15s}
.drawer-btn:hover,.drawer-btn.active{background:var(--primary-light);color:var(--primary);font-weight:700}

/* ── AI Tab (batch3 inline) ─────────────────────────────── */
.nav-btn.ai-tab{background:linear-gradient(135deg,#6d28d9 0%,#7c3aed 100%);color:#fff;border:none;font-weight:700;letter-spacing:.01em;box-shadow:0 2px 8px rgba(109,40,217,.25);transition:background .18s,box-shadow .18s,transform .12s}
.nav-btn.ai-tab:hover{background:linear-gradient(135deg,#5b21b6 0%,#6d28d9 100%);box-shadow:0 4px 14px rgba(109,40,217,.38);transform:translateY(-1px)}
.nav-btn.ai-tab.active,.nav-btn.ai-tab[aria-current="page"]{background:linear-gradient(135deg,#4c1d95 0%,#5b21b6 100%);box-shadow:0 0 0 2px #a78bfa,0 4px 12px rgba(109,40,217,.35);color:#fff}
.drawer-btn[data-nav="ai-ideas"]{color:#7c3aed;font-weight:700}
.drawer-btn[data-nav="ai-ideas"]:hover,.drawer-btn[data-nav="ai-ideas"].active{background:rgba(124,58,237,.10);color:#6d28d9}
.ai-cat-tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.ai-cat-tab{padding:6px 14px;border-radius:20px;border:1.5px solid #c4b5fd;background:#f5f3ff;color:#5b21b6;font-size:12px;font-weight:700;cursor:pointer;transition:background .15s,color .15s,border-color .15s;white-space:nowrap}
.ai-cat-tab:hover{background:#ede9fe;border-color:#7c3aed}
.ai-cat-tab.active{background:linear-gradient(135deg,#6d28d9,#7c3aed);color:#fff;border-color:transparent;box-shadow:0 2px 8px rgba(109,40,217,.28)}
.ai-cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.ai-card{background:#fff;border:1.5px solid #e5e7eb;border-radius:12px;padding:16px 18px;transition:box-shadow .18s,border-color .18s,transform .12s;position:relative}
.ai-card:hover{box-shadow:0 6px 20px rgba(109,40,217,.12);border-color:#c4b5fd;transform:translateY(-2px)}
.ai-card-title{font-size:13.5px;font-weight:800;color:#1e1b4b;margin-bottom:6px;line-height:1.4}
.ai-card-desc{font-size:12px;color:#52586a;line-height:1.65;margin-bottom:10px}
.ai-card-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.ai-badge{display:inline-block;padding:2px 9px;border-radius:10px;font-size:10.5px;font-weight:700;letter-spacing:.03em;text-transform:uppercase}
.ai-badge-live{background:#dcfce7;color:#166534}
.ai-badge-pilot{background:#fef9c3;color:#854d0e}
.ai-badge-oppty{background:#ede9fe;color:#5b21b6}
.ai-badge-quick{background:#e0f2fe;color:#075985}
.ai-effort-chip{font-size:10px;color:#8a90a0;font-weight:600;margin-left:auto}

/* ── Deep Dives nav (batch3 inline) ─────────────────────── */
.nav-btn.dee{background:linear-gradient(135deg,#0f766e 0%,#0d9488 100%);color:#fff;border:none;font-weight:700;letter-spacing:.01em;box-shadow:0 2px 8px rgba(13,148,136,.22)}
.nav-btn.dee:hover{background:linear-gradient(135deg,#0c6962 0%,#0f766e 100%);box-shadow:0 4px 14px rgba(13,148,136,.35);transform:translateY(-1px)}
.nav-btn.dee.active,.nav-btn.dee[aria-current="page"]{background:linear-gradient(135deg,#134e4a 0%,#0f766e 100%);box-shadow:0 0 0 2px #5eead4,0 4px 12px rgba(13,148,136,.3);color:#fff}
.drawer-btn[data-nav="geo-ai-seo"],.drawer-btn[data-nav="feature-gaps"],.drawer-btn[data-nav="product-gaps"],.drawer-btn[data-nav="tech-gaps"],.drawer-btn[data-nav="tech-stack"],.drawer-btn[data-nav="global-comparison"],.drawer-btn[data-nav="improvements"]{color:#0f766e;font-weight:600}
.drawer-btn[data-nav="geo-ai-seo"]:hover,.drawer-btn[data-nav="feature-gaps"]:hover,.drawer-btn[data-nav="product-gaps"]:hover,.drawer-btn[data-nav="tech-gaps"]:hover,.drawer-btn[data-nav="tech-stack"]:hover,.drawer-btn[data-nav="global-comparison"]:hover,.drawer-btn[data-nav="improvements"]:hover,.drawer-btn[data-nav="geo-ai-seo"].active,.drawer-btn[data-nav="feature-gaps"].active,.drawer-btn[data-nav="product-gaps"].active,.drawer-btn[data-nav="tech-gaps"].active,.drawer-btn[data-nav="tech-stack"].active,.drawer-btn[data-nav="global-comparison"].active,.drawer-btn[data-nav="improvements"].active{background:rgba(13,148,136,.10);color:#0c6962}

/* ── Roadmap (batch3 inline) ─────────────────────────────── */
.rm-timeline{position:relative;padding-left:32px;margin:24px 0}
.rm-timeline::before{content:'';position:absolute;left:10px;top:0;bottom:0;width:2px;background:linear-gradient(180deg,#1a56db,#0d9488,#6d28d9);border-radius:2px}
.rm-phase{position:relative;margin-bottom:32px}
.rm-phase:last-child{margin-bottom:0}
.rm-dot{position:absolute;left:-26px;top:4px;width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 2px currentColor}
.rm-dot-q1{background:#1a56db;color:#1a56db}
.rm-dot-q2{background:#0891b2;color:#0891b2}
.rm-dot-q3{background:#0d9488;color:#0d9488}
.rm-dot-q4{background:#6d28d9;color:#6d28d9}
.rm-dot-2027{background:#d97706;color:#d97706}
.rm-dot-2028{background:#dc2626;color:#dc2626}
.rm-phase-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:6px}
.rm-phase-title{font-size:14px;font-weight:800;color:var(--text);margin-bottom:8px;line-height:1.3}
.rm-tasks{display:flex;flex-wrap:wrap;gap:6px}
.rm-task{font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;background:var(--card);border:1.5px solid var(--border);color:var(--text-soft);white-space:nowrap}
.rm-task-crit{border-color:#fca5a5;background:#fff1f2;color:#b91c1c}
.rm-task-high{border-color:#fdba74;background:#fff7ed;color:#c2410c}
.rm-task-med{border-color:#6ee7b7;background:#ecfdf5;color:#047857}
.rm-task-strat{border-color:#c4b5fd;background:#f5f3ff;color:#6d28d9}

/* ── Scorecard (batch3 inline) ───────────────────────────── */
.scorecard-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin:20px 0}
.scorecard-card{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:16px 18px;transition:box-shadow .18s,transform .18s}
.scorecard-card:hover{box-shadow:0 4px 18px rgba(15,23,42,.09);transform:translateY(-2px)}
.scorecard-flag{font-size:1.4rem;margin-bottom:6px}
.scorecard-name{font-size:13px;font-weight:800;color:var(--text);margin-bottom:12px}
.scorecard-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.scorecard-lbl{font-size:11px;color:var(--muted);font-weight:600}
.scorecard-bar-wrap{flex:1;height:6px;background:var(--border);border-radius:4px;margin:0 10px;overflow:hidden}
.scorecard-bar{height:100%;border-radius:4px;transition:width .8s cubic-bezier(0.16,1,0.3,1)}
.scorecard-val{font-size:11px;font-weight:800;color:var(--text);min-width:28px;text-align:right}
.scorecard-priority{margin-top:10px;font-size:11px;color:var(--muted);line-height:1.6}
.scorecard-priority strong{color:var(--text)}

/* ── Priority matrix (batch3 inline) ────────────────────── */
.matrix-quad{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0}
.quad-card{border-radius:12px;padding:16px;border:1.5px solid var(--border)}
.quad-label{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px}
.quad-items{display:flex;flex-direction:column;gap:5px}
.quad-item{font-size:11.5px;font-weight:600;color:var(--text);padding:4px 8px;border-radius:6px;background:rgba(0,0,0,.03)}

/* ── Calculator (batch3 inline) ─────────────────────────── */
.calc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin:16px 0}
.calc-item{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;transition:box-shadow .15s}
.calc-item:hover{box-shadow:var(--shadow)}
.calc-item-icon{font-size:20px;flex-shrink:0}
.calc-item-body{flex:1;min-width:0}
.calc-item-name{font-size:12px;font-weight:700;color:var(--text);margin-bottom:2px}
.calc-item-roi{font-size:18px;font-weight:900;color:var(--primary);font-variant-numeric:tabular-nums}
.calc-item-text{font-size:10.5px;color:var(--muted)}

/* ── Gap table ───────────────────────────────────────────── */
.gap-table{margin:16px 0}

/* ── Tech stack tags ─────────────────────────────────────── */
.tech-tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10.5px;font-weight:700;background:var(--bg);border:1px solid var(--border);color:var(--text-soft);margin:2px}

/* ── Donut charts (batch3) ───────────────────────────────── */
.donut-grid{display:flex;flex-wrap:wrap;gap:24px;justify-content:center;padding:16px 0}
.donut-item{text-align:center}

.donut-label{font-size:12.5px;font-weight:700;color:var(--text)}

/* ── Footer ─────────────────────────────────────────────── */

/* ── Print ───────────────────────────────────────────────── */
@media print{
  .site-header,.sidebar,.main-nav{display:none!important}
  .layout{display:block}
  [data-sec]{display:block!important;page-break-before:always}
  .content{box-shadow:none;border:none}
  .chip,.badge,.lchip{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}

/* ── Responsive ──────────────────────────────────────────── */
@media(max-width:768px){
  .sidebar{display:none}
  .layout{grid-template-columns:1fr}
  .hamburger{display:flex}
  #main-content{padding:16px}
  .matrix-quad{grid-template-columns:1fr}
  .scorecard-grid{grid-template-columns:1fr}
}
</style>
</head>

    </footer>

<script>
(function(){
  'use strict';

  /* ── Scroll progress bar ── */
  var bar = document.getElementById('scroll-bar');
  document.addEventListener('scroll', function(){
    var pct = window.scrollY / (document.documentElement.scrollHeight - window.innerHeight) * 100;
    if(bar) bar.style.width = Math.min(100, pct) + '%';
  }, {passive:true});

  /* ── Section registry ── */
  var SEC_FILES = {
    overview:          'sections/overview.html',
    ksa:               'sections/ksa.html',
    uae:               'sections/uae.html',
    qatar:             'sections/qatar.html',
    kuwait:            'sections/kuwait.html',
    bahrain:           'sections/bahrain.html',
    oman:              'sections/oman.html',
    heatmap:           'sections/heatmap.html',
    'ai-ideas':        'sections/ai-ideas.html',
    'deep-dives-menu': 'sections/deep-dives-menu.html',
    'geo-ai-seo':      'sections/geo-ai-seo.html',
    'feature-gaps':    'sections/feature-gaps.html',
    'product-gaps':    'sections/product-gaps.html',
    'tech-gaps':       'sections/tech-gaps.html',
    'tech-stack':      'sections/tech-stack.html',
    'global-comparison':'sections/global-comparison.html',
    improvements:      'sections/improvements.html',
  };

  var cache = {};
  var currentSec = null;
  var container = document.getElementById('sec-container');

  /* ── Section loader ── */
  function loadSection(id, callback){
    if(cache[id]){callback(cache[id]);return;}
    var url = SEC_FILES[id];
    if(!url){callback('<div class="content"><p>Section not found: '+id+'</p></div>');return;}
    fetch(url).then(function(r){
      if(!r.ok) throw new Error('HTTP '+r.status);
      return r.text();
    }).then(function(html){
      cache[id] = html;
      callback(html);
    }).catch(function(e){
      callback('<div class="content callout callout-warn"><p>Could not load section <strong>'+id+'</strong>. Error: '+e.message+'</p></div>');
    });
  }

  /* ── Show section ── */
  window.showSection = function(id){
    if(!SEC_FILES[id]) return;
    // Update nav active states
    document.querySelectorAll('.nav-btn[data-nav]').forEach(function(b){
      b.classList.toggle('active', b.dataset.nav === id);
    });
    document.querySelectorAll('.drawer-btn[data-nav]').forEach(function(b){
      b.classList.toggle('active', b.dataset.nav === id);
    });

    currentSec = id;
    window.scrollTo({top:0,behavior:'smooth'});

    // Show loading state
    container.innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted)"><div style="font-size:24px;margin-bottom:8px">⏳</div><div style="font-size:13px">Loading...</div></div>';

    loadSection(id, function(html){
      container.innerHTML = html;
      // Execute any inline scripts
      container.querySelectorAll('script').forEach(function(s){
        var ns = document.createElement('script');
        ns.textContent = s.textContent;
        document.body.appendChild(ns);
      });
      // Init tab bars within the section
      initTabs();
      // Close mobile drawer
      closeMobileDrawer();
    });
  };

  /* ── Tab bar init ── */
  function initTabs(){
    container.querySelectorAll('.tab-bar').forEach(function(bar){
      bar.querySelectorAll('.tab-btn').forEach(function(btn){
        btn.addEventListener('click', function(){
          var target = btn.dataset.tab;
          var parent = btn.closest('.tab-wrap') || btn.parentElement.parentElement;
          parent.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
          parent.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.remove('active'); });
          btn.classList.add('active');
          var panel = parent.querySelector('[data-panel="'+target+'"]');
          if(panel) panel.classList.add('active');
        });
      });
    });
  }

  /* ── Nav button clicks ── */
  document.querySelectorAll('[data-nav]').forEach(function(btn){
    btn.addEventListener('click', function(){
      showSection(btn.dataset.nav);
    });
  });

  /* ── Mobile drawer ── */
  var drawerEl = document.getElementById('mobile-drawer');
  var overlayEl = document.getElementById('drawer-overlay');
  var hamburger = document.getElementById('hamburger-btn');
  var drawerClose = document.getElementById('drawer-close');

  function openMobileDrawer(){
    drawerEl.classList.add('open');
    overlayEl.classList.add('open');
    overlayEl.setAttribute('aria-hidden','false');
    hamburger.setAttribute('aria-expanded','true');
    document.body.style.overflow='hidden';
  }
  function closeMobileDrawer(){
    drawerEl.classList.remove('open');
    overlayEl.classList.remove('open');
    overlayEl.setAttribute('aria-hidden','true');
    hamburger.setAttribute('aria-expanded','false');
    document.body.style.overflow='';
  }
  if(hamburger) hamburger.addEventListener('click', openMobileDrawer);
  if(drawerClose) drawerClose.addEventListener('click', closeMobileDrawer);
  if(overlayEl) overlayEl.addEventListener('click', closeMobileDrawer);

  /* ── Theme toggle ── */
  var html = document.documentElement;
  var prefersDark = window.matchMedia('(prefers-color-scheme:dark)');
  var theme = prefersDark.matches ? 'dark' : 'light';
  html.setAttribute('data-theme', theme);
  var themeBtn = document.getElementById('theme-btn');
  function applyTheme(t){
    theme = t;
    html.setAttribute('data-theme', t);
    if(themeBtn){
      themeBtn.innerHTML = t === 'dark'
        ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
        : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
      themeBtn.setAttribute('aria-label', t === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
    }
    // Apply dark CSS overrides
    if(t === 'dark'){
      if(!document.getElementById('dark-css')){
        var s = document.createElement('style');
        s.id = 'dark-css';
        s.textContent = '[data-theme=dark]{--bg:#0f1117;--card:#181b25;--border:#262d3d;--text:#e2e8f0;--text-soft:#94a3b8;--muted:#64748b;--primary:#60a5fa;--primary-dark:#3b82f6;--primary-light:rgba(96,165,250,.1);--accent:#fbbf24;--accent-light:rgba(251,191,36,.1);--success:#34d399;--success-light:rgba(52,211,153,.1);--warning:#fcd34d;--danger:#f87171;--shadow:0 2px 8px rgba(0,0,0,.4);--shadow-lg:0 8px 28px rgba(0,0,0,.5)}[data-theme=dark] body{background:var(--bg)}[data-theme=dark] .site-header,[data-theme=dark] .sidebar,[data-theme=dark] .drawer{background:#12151e;border-color:var(--border)}[data-theme=dark] .nav-btn:hover,[data-theme=dark] .nav-btn.active{background:rgba(96,165,250,.12);color:var(--primary)}[data-theme=dark] .content{background:var(--card);border-color:var(--border)}[data-theme=dark] thead{background:var(--bg)}[data-theme=dark] tbody tr:hover{background:rgba(255,255,255,.03)}[data-theme=dark] .kpi-card{background:var(--card);border-color:var(--border)}[data-theme=dark] .ins-card{background:var(--card);border-color:var(--border)}[data-theme=dark] .ai-card{background:var(--card);border-color:var(--border)}[data-theme=dark] .scorecard-card{background:var(--card)}[data-theme=dark] .rm-task{background:var(--card)}';
        document.head.appendChild(s);
      }
    } else {
      var ds = document.getElementById('dark-css');
      if(ds) ds.remove();
    }
  }
  applyTheme(theme);
  if(themeBtn) themeBtn.addEventListener('click', function(){ applyTheme(theme === 'dark' ? 'light' : 'dark'); });

  /* ── Default section ── */
  showSection('overview');
})();
</script>
</body>
